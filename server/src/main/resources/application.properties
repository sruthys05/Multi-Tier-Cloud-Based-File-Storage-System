# ==========================================

# Server Configuration

# ==========================================

server.port=8081
server.servlet.context-path=/api

# ==========================================

# H2 Database (Development)

# ==========================================

spring.datasource.url=jdbc:h2:mem:datavault;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.username=root
spring.datasource.password=root123
spring.datasource.driver-class-name=org.h2.Driver

spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# ==========================================

# MySQL Database (Production)

# Uncomment when using MySQL

# ==========================================

# spring.datasource.url=jdbc:mysql://localhost:3306/datavault?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true

# spring.datasource.username=root

# spring.datasource.password=sqlpassword

# spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ==========================================

# JPA / Hibernate

# ==========================================

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect
spring.jpa.properties.hibernate.format_sql=true

# ==========================================

# File Upload Configuration

# ==========================================

spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=500MB
spring.servlet.multipart.max-request-size=500MB

# ==========================================

# File Storage

# ==========================================

app.file.upload-dir=${user.dir}/uploads

# ==========================================

# JWT Configuration

# ==========================================

app.jwt.secret=404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970337336763979244226452948404D635166546A576E5A7234753778214125442A47
app.jwt.expiration=86400000

# ==========================================

# CORS

# ==========================================

app.cors.allowed-origins=http://localhost:3000

# ==========================================

# Google OAuth2 Configuration

# Replace with your real credentials

# ==========================================

spring.security.oauth2.client.registration.google.client-id=YOUR_GOOGLE_CLIENT_ID
spring.security.oauth2.client.registration.google.client-secret=YOUR_GOOGLE_CLIENT_SECRET

spring.security.oauth2.client.registration.google.scope=email,profile

spring.security.oauth2.client.registration.google.redirect-uri={baseUrl}/login/oauth2/code/{registrationId}

spring.security.oauth2.client.registration.google.client-name=Google

# ==========================================

# Logging (Optional)

# ==========================================

logging.level.org.springframework.security=INFO
logging.level.org.hibernate.SQL=DEBUG
